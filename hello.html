<html>
  <head>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
      .card {
          background: #F0F0EC;
          border: 1px solid dimgray;
          border-radius: 8px;
          padding: 2px 10px;
          margin-bottom: 8px;
          font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
          font-size: 13px;
          color: #171717;
          cursor: pointer;
          
      }
      .card:hover{
        background: #d3d3cf;
      }
      .card-text{
        display: -webkit-box; 
        -webkit-box-orient: vertical; 
        overflow: hidden;
        -webkit-line-clamp: 2;
      }
      
      .btn{
        font-size: 0.875rem;
        color: #6b7280;
        border: 1px solid #d1d5db;
        border-radius: 2px;
        padding: 2px 12px;
        cursor: pointer;
        background: none;
        display: none;
        height: 1.4rem;
      }
      .btn:hover{
        color: #1f2937;
      }
      #cardsContainer{
        max-height: 300px;
        max-width: fit-content;
        overflow-y: auto;
      }

    </style>
  </head>
  <body style= "width: 300px">
    <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #d1d5db; padding-bottom: 8px; margin-bottom: 8px;">
      <h2 style="font-family: 'EB Garamond', serif; margin: 0;">On this page</h2>
        <div>
          <button id="dashboardBtn" class="btn"><i class="bi bi-arrow-up-right"></i></button>
          <button id="signInBtn" class="btn" style="display:none">Sign in</button>
          <button id="signOutBtn" class="btn">Sign out</button>
        </div>
      </div>
    <div id="cardsContainer"></div>
  
    
    <script src="supabase.js"></script>
    <script src="popup.js"></script>
    
  </body>
</html>
